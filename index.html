<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

<div class="game-container">
  <h1>Clicky Game</h1>

  <div class="top-panel">
    <div class="stat-box">
      <span class="stat-label">Current Score</span>
      <span class="stat-value" id="scoreDisplay">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">Time Left</span>
      <span class="stat-value" id="timerDisplay">60</span>
    </div>
  </div>

  <div class="game-area">
    <button id="clickButton">Click me!</button>
    <div class="status-box" id="message">
      Click the button to start the game. You have 60 seconds.
    </div>
    <button id="resetButton">Reset Game</button>
  </div>

  <section class="submit-section">
    <h2>Submit Your Score</h2>
    <p id="finalScore">Final score: -</p>

    <div class="submit-controls">
      <input id="nameInput" type="text" maxlength="20" placeholder="Enter your name" />
      <button id="submitButton" disabled>Submit Score</button>
    </div>
  </section>

  <section class="scoreboard-section">
    <h2>Scoreboard</h2>
    <ul id="scoreboardList">
      <li>Loading scoreboard...</li>
    </ul>
  </section>
</div>

  <script src="js/app.js"></script>

</body>

</html>
